<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Акции, скидки и кешбэк для физических и юридических лиц - Интернет-магазин ЭТМ iPRO.</title>
  <meta name="description" content="Свежие акции - Май 2026. Скидки до 40 % и кешбэк . Выгодные условия для юр.лиц." />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', system-ui, -apple-system, 'Segoe UI', sans-serif;
      background-color: #eef0f3;
      color: #212731;
    }

    /* Контейнер */
    .page-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px 32px;
    }

    /* Хлебные крошки */
    .breadcrumbs {
      margin-bottom: 28px;
      font-size: 14px;
      color: #6c7a91;
    }
    .breadcrumbs a {
      color: #0876cc;
      text-decoration: none;
      transition: color 0.2s;
    }
    .breadcrumbs a:hover {
      text-decoration: underline;
      color: #09529b;
    }
    .breadcrumbs span {
      color: #2c3e50;
      font-weight: 500;
    }

    /* Фильтр — единая строка с тремя селектами */
    .filter-bar {
      background: #ffffff;
      border-radius: 16px;
      padding: 16px 24px;
      margin-bottom: 32px;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      border: 1px solid #e9edf2;
    }
    .filter-group {
      display: flex;
      flex-direction: column;
      min-width: 180px;
      flex: 1 1 180px;
    }
    .filter-group label {
      font-size: 13px;
      font-weight: 500;
      color: #4b5a72;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }
    .filter-select {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid #cdd3db;
      background-color: #fff;
      font-size: 14px;
      color: #1f2a48;
      cursor: pointer;
      transition: all 0.2s;
      outline: none;
      font-family: inherit;
    }
    .filter-select:hover {
      border-color: #8f9bb3;
    }
    .filter-select:focus {
      border-color: #0876cc;
      box-shadow: 0 0 0 2px rgba(8, 118, 204, 0.2);
    }

    /* Сетка карточек */
    .actions-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
      margin-bottom: 48px;
    }
    .action-card {
      background: #ffffff;
      border-radius: 20px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
      cursor: pointer;
    }
    .action-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 28px rgba(0, 0, 0, 0.08);
    }
    .card-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #f0f2f6;
      display: block;
    }
    .card-content {
      padding: 18px 20px 22px;
    }
    .card-badge {
      display: inline-block;
      background: #fff0e6;
      color: #e05a1a;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 30px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.4;
      color: #0c4e9c;
      margin-bottom: 8px;
    }
    .card-date {
      font-size: 13px;
      color: #7e8a9e;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
    }
    .card-meta {
      font-size: 12px;
      color: #9aa4b8;
      margin-top: 8px;
      border-top: 1px solid #eff2f8;
      padding-top: 8px;
      display: flex;
      justify-content: space-between;
    }

    /* Пагинация */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin: 20px 0 30px;
    }
    .page-item {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 40px;
      height: 40px;
      padding: 0 8px;
      border-radius: 12px;
      background: #fff;
      color: #2c3e50;
      font-weight: 500;
      font-size: 14px;
      text-decoration: none;
      transition: 0.2s;
      border: 1px solid #e2e8f0;
      cursor: pointer;
    }
    .page-item.active {
      background: #09529b;
      color: white;
      border-color: #09529b;
      cursor: default;
      pointer-events: none;
    }
    .page-item:hover:not(.active) {
      background: #eef2fc;
      border-color: #b9c6de;
    }
    .page-dots {
      color: #6f7c98;
      padding: 0 6px;
      font-weight: 500;
    }
    .disabled-page {
      opacity: 0.5;
      pointer-events: none;
    }

    @media (max-width: 760px) {
      .page-container {
        padding: 16px;
      }
      .filter-bar {
        flex-direction: column;
        align-items: stretch;
        gap: 14px;
      }
      .filter-group {
        min-width: 100%;
      }
      .actions-grid {
        gap: 18px;
      }
      .page-item {
        min-width: 36px;
        height: 36px;
      }
    }
  </style>
</head>
<body>
<div class="page-container">
  <!-- 1. Хлебные крошки: Главная (ссылка) / Акции (без ссылки) -->
  <div class="breadcrumbs">
    <a href="/">Главная</a> &nbsp; / &nbsp;
    <span>Акции</span>
  </div>
<div style="padding-bottom:10 px;"><h1>Акции</h1> </div>
  <!-- 2. Фильтр одной строкой: три выпадающих списка -->
  <div class="filter-bar">
    <div class="filter-group">
      <label>Тип акции</label>
      <select id="filterType" class="filter-select">
        <option value="all">Все</option>
        <option value="cashback">Кешбек</option>
        <option value="discount">Скидка</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Производитель</label>
      <select id="filterBrand" class="filter-select">
        <option value="all">Все</option>
        <option value="Промрукав">Промрукав</option>
        <option value="Космос">Космос</option>
        <option value="Евроавтоматика">Евроавтоматика</option>
        <option value="Kranz">Kranz</option>
        <option value="Rexant">Rexant</option>
        <option value="Lavr">Lavr</option>
        <option value="Кордлайн">Кордлайн</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Товарная группа</label>
      <select id="filterGroup" class="filter-select">
        <option value="all">Все</option>
        <option value="Кабели">Кабели</option>
        <option value="Светотехника">Светотехника</option>
        <option value="Авт. выключатели">Авт. выключатели</option>
        <option value="Выключатели и розетки">Выключатели и розетки</option>
        <option value="Инструменты">Инструменты</option>
        <option value="Пром.химия">Пром.химия</option>
      </select>
    </div>
  </div>

  <!-- Список акций (динамический) -->
  <div id="actionsList" class="actions-grid"></div>

  <!-- Пагинация -->
  <div id="paginationContainer" class="pagination"></div>
</div>

<script>
  // ----------------------------------------------
  //  ГЕНЕРАЦИЯ ДАННЫХ АКЦИЙ (на основе переданного файла + расширение до 81+)
  // ----------------------------------------------
  let allActions = [];

  // Базовые акции из исходного контента (репрезентативные)
  const baseActions = [
    { id: 1, title: "Беспроцентная рассрочка от ЭТМ", start: "01.04.2026", end: "30.06.2026", type: "cashback", brand: "ЭТМ", group: "Кабели", img: "https://personalization-web.g.mindbox.ru/user-media/37304/05eec6a843c9877b8e2ed2e152a79b7afd009e694666dca44a31833ad5f0b2a0.png", badge: "Кешбек 5%" },
    { id: 2, title: "Скидка на коммутаторы", start: "10.04.2026", end: "20.05.2026", type: "discount", brand: "Rexant", group: "Авт. выключатели", img: "https://personalization-web.g.mindbox.ru/user-media/37304/8cf655f4dc363f65aee4a5b332f0f70b3325fb14e99642da0ab705e9f5d42f74.jpg", badge: "Скидка 15%" },
    { id: 3, title: "Летняя спецодежда со скидкой", start: "01.05.2026", end: "31.07.2026", type: "discount", brand: "Промрукав", group: "Пром.химия", img: "https://personalization-web.g.mindbox.ru/user-media/37304/2fcb7de42f5b2ab50ff54ae4ec75d60b4caad94ae184d240c10eb023098d407b.png", badge: "Скидка 20%" },
    { id: 4, title: "Кешбек на кабель", start: "15.04.2026", end: "15.06.2026", type: "cashback", brand: "Кордлайн", group: "Кабели", img: "https://personalization-web.g.mindbox.ru/user-media/37304/0ce19445abbf4e14eb593686a2c8c9bfe7d40bd99dd11dcf53d6da9cf910a92a.png", badge: "Кешбек 10%" },
    { id: 5, title: "Светотехника Космос", start: "01.05.2026", end: "30.08.2026", type: "discount", brand: "Космос", group: "Светотехника", img: "https://personalization-web.g.mindbox.ru/user-media/37304/c5fac282580126ce91f3c96b604cd035972246d8679c499e37fe07761770ce2c.jpg", badge: "Скидка 12%" },
    { id: 6, title: "Автоматика со скидкой", start: "20.04.2026", end: "10.06.2026", type: "discount", brand: "Евроавтоматика", group: "Авт. выключатели", img: "https://personalization-web.g.mindbox.ru/user-media/37304/8a1c48674d3b407d034d874aee6f19b9ad75fac5bf6c5e49eb2b164c0148ec24.png", badge: "Скидка 25%" },
    { id: 7, title: "Инструменты Kranz", start: "01.04.2026", end: "30.06.2026", type: "discount", brand: "Kranz", group: "Инструменты", img: "https://personalization-web.g.mindbox.ru/user-media/37304/3da8a37f30c0fc9941b60c1d26e5495b8b04d72ca657160297ff799906489f74.jpg", badge: "Скидка 30%" },
    { id: 8, title: "Промхимия Lavr – бонусы", start: "15.05.2026", end: "15.07.2026", type: "cashback", brand: "Lavr", group: "Пром.химия", img: "https://personalization-web.g.mindbox.ru/user-media/37304/212cfd6704c87d4c7f1eb21bd5a38c5cd9461973d2cef9b2db06fd526a7eda8b.png", badge: "Бонус 7%" },
    { id: 9, title: "Розетки Rexant с кешбэком", start: "05.04.2026", end: "25.06.2026", type: "cashback", brand: "Rexant", group: "Выключатели и розетки", img: "https://personalization-web.g.mindbox.ru/user-media/37304/427628d7db8a813e6c04184cbffeeae7b1a080987bad1ebbbe6730a6347d82cf.png", badge: "Кешбек 8%" },
    { id: 10, title: "Кабели Кордлайн", start: "01.03.2026", end: "31.05.2026", type: "discount", brand: "Кордлайн", group: "Кабели", img: "https://personalization-web.g.mindbox.ru/user-media/37304/5e5742d7f8f2f8d00baf691152cd36c425155342ad13c810068f5ace5d54b20e.jpg", badge: "Скидка 18%" }
  ];

  // Дополняем до 81 элемента, чтобы пагинация была наглядной (81 страница)
  const brandList = ["Промрукав","Космос","Евроавтоматика","Kranz","Rexant","Lavr","Кордлайн"];
  const groupList = ["Кабели","Светотехника","Авт. выключатели","Выключатели и розетки","Инструменты","Пром.химия"];
  
  for (let i = 11; i <= 81; i++) {
    const typeIdx = i % 2 === 0 ? "cashback" : "discount";
    const brandItem = brandList[i % brandList.length];
    const groupItem = groupList[i % groupList.length];
    const discountText = typeIdx === "cashback" ? "Кешбек до 12%" : "Скидка до 25%";
    allActions.push({
      id: i,
      title: `${typeIdx === 'cashback' ? 'Кешбек-акция' : 'Скидочная акция'} №${i}`,
      start: `01.0${(i % 5) + 3}.2026`,
      end: `30.0${((i % 4) + 6)}.2026`,
      type: typeIdx,
      brand: brandItem,
      group: groupItem,
      img: "https://personalization-web.g.mindbox.ru/user-media/37304/904d527c8f4b6a2f2d1d3b5d7e8a9c0f.png",
      badge: discountText
    });
  }
  // объединяем первые 10 + сгенерированные
  allActions = [...baseActions, ...allActions];

  // DOM элементы
  const actionsContainer = document.getElementById('actionsList');
  const paginationDiv = document.getElementById('paginationContainer');
  const filterTypeSelect = document.getElementById('filterType');
  const filterBrandSelect = document.getElementById('filterBrand');
  const filterGroupSelect = document.getElementById('filterGroup');

  let currentPage = 1;
  const itemsPerPage = 12;

  // Получение отфильтрованного списка
  function getFilteredActions() {
    const typeVal = filterTypeSelect.value;
    const brandVal = filterBrandSelect.value;
    const groupVal = filterGroupSelect.value;

    return allActions.filter(action => {
      if (typeVal !== 'all' && action.type !== typeVal) return false;
      if (brandVal !== 'all' && action.brand !== brandVal) return false;
      if (groupVal !== 'all' && action.group !== groupVal) return false;
      return true;
    });
  }

  // Рендер карточек
  function renderActions() {
    const filtered = getFilteredActions();
    const totalItems = filtered.length;
    const totalPages = Math.ceil(totalItems / itemsPerPage);
    if (currentPage > totalPages) currentPage = totalPages || 1;
    
    const startIdx = (currentPage - 1) * itemsPerPage;
    const pageItems = filtered.slice(startIdx, startIdx + itemsPerPage);

    if (pageItems.length === 0) {
      actionsContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:48px; background:#fff; border-radius:24px;">Нет акций по выбранным фильтрам</div>`;
    } else {
      actionsContainer.innerHTML = pageItems.map(item => `
        <div class="action-card">
          <img class="card-image" src="${item.img}" alt="${item.title}" loading="lazy" onerror="this.src='https://placehold.co/400x200?text=ЭТМ+Акция'">
          <div class="card-content">
            <div class="card-badge">${item.badge}</div>
            <div class="card-title">${item.title}</div>
            <div class="card-date">📅 ${item.start} — ${item.end}</div>
            <div class="card-meta">
              <span>🏷️ ${item.brand}</span>
              <span>📁 ${item.group}</span>
            </div>
          </div>
        </div>
      `).join('');
    }
    renderPagination(totalPages);
  }

  // Пагинация: стандартный вид 1, 2, 3, 4 ... 81 (активная страница)
  function renderPagination(totalPages) {
    if (totalPages <= 1) {
      paginationDiv.innerHTML = '';
      return;
    }
    let html = '';
    // Кнопка "Назад"
    html += `<div class="page-item ${currentPage === 1 ? 'disabled-page' : ''}" data-page="${currentPage - 1}">←</div>`;

    let startPage = Math.max(1, currentPage - 2);
    let endPage = Math.min(totalPages, currentPage + 2);
    
    if (currentPage <= 3) {
      endPage = Math.min(totalPages, 5);
    }
    if (currentPage >= totalPages - 2) {
      startPage = Math.max(1, totalPages - 4);
    }
    
    if (startPage > 1) {
      html += `<div class="page-item" data-page="1">1</div>`;
      if (startPage > 2) html += `<span class="page-dots">...</span>`;
    }
    for (let i = startPage; i <= endPage; i++) {
      const activeClass = i === currentPage ? 'active' : '';
      html += `<div class="page-item ${activeClass}" data-page="${i}">${i}</div>`;
    }
    if (endPage < totalPages) {
      if (endPage < totalPages - 1) html += `<span class="page-dots">...</span>`;
      html += `<div class="page-item" data-page="${totalPages}">${totalPages}</div>`;
    }
    // Кнопка "Вперёд"
    html += `<div class="page-item ${currentPage === totalPages ? 'disabled-page' : ''}" data-page="${currentPage + 1}">→</div>`;

    paginationDiv.innerHTML = html;

    // Добавляем обработчики кликов на элементы пагинации
    document.querySelectorAll('.page-item[data-page]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.preventDefault();
        const newPage = parseInt(el.dataset.page);
        if (!isNaN(newPage) && newPage >= 1 && newPage <= totalPages && newPage !== currentPage) {
          currentPage = newPage;
          renderActions();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });
    });
  }

  // Сброс страницы при изменении фильтров
  function resetAndRender() {
    currentPage = 1;
    renderActions();
  }

  // Подписка на изменения фильтров
  filterTypeSelect.addEventListener('change', resetAndRender);
  filterBrandSelect.addEventListener('change', resetAndRender);
  filterGroupSelect.addEventListener('change', resetAndRender);

  // Убираем блок "Прошедшие акции" — в вёрстке его нет, это выполнено.
  // Инициализация
  renderActions();
</script>
</body>
</html>
